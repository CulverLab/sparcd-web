worker_processes auto;

user nobody nogroup;
# 'user nobody nobody;' for systems with 'nobody' as a group instead
error_log  /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024; # increase if you have lots of clients
  accept_mutex off;
  # 'use epoll;' to enable for Linux 2.6+
  # 'use kqueue;' to enable for FreeBSD, OSX
}

http {
  include mime.types;
  # fallback in case we can't determine a type
  default_type application/octet-stream;
  access_log /var/log/nginx/access.log combined;
  sendfile on;
  tcp_nopush  on;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1000;

  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

  upstream app_server {
    # fail_timeout=0 means we always retry an upstream even if it failed
    # to return a good HTTP response

    # for UNIX domain socket setups
    #server unix:/tmp/gunicorn.sock fail_timeout=0;

    # for a TCP configuration
    server 127.0.0.1:3000 fail_timeout=0;
  }

  server {
    # if no Host match, close the connection to prevent host spoofing
    listen 443 ssl default_server;
    ssl_certificate     /etc/nginx/certs/public.crt;
    ssl_certificate_key /etc/nginx/certs/private.key;
    return 444;
  }

  server {
    # Redirect HTTP to HTTPS
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    # use 'listen 80 deferred;' for Linux
    # use 'listen 80 accept_filter=httpready;' for FreeBSD
    listen 443 ssl;
    ssl_certificate     /etc/nginx/certs/public.crt;
    ssl_certificate_key /etc/nginx/certs/private.key;
    ssl_prefer_server_ciphers on;

    client_max_body_size 200M;

    # set the correct host(s) for your site
    server_name 127.0.0.1 localhost sparcd.arizona.edu;

    keepalive_timeout 75;

    # NOTE: add_header is not inherited by location blocks that define their
    # own add_header directives. If you add add_header to any location block,
    # you must also repeat the HSTS header there or it will be silently dropped.
    add_header Strict-Transport-Security "max-age=63072000" always;

    # path for static files
    root /website;

    location / {
      # checks for static file, if not found proxy to app
      try_files $uri @proxy_to_app;
    }

    # Service worker must never be cached - browsers won't pick up updates otherwise
    location = /sw.js {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Strict-Transport-Security "max-age=63072000" always;
      expires 0;
    }

    # PWA manifest should refresh regularly
    location = /manifest.json {
      add_header Cache-Control "no-cache";
      add_header Strict-Transport-Security "max-age=63072000" always;
      expires 0;
    }

    # Aggressively cache hashed static assets (JS, CSS, images, fonts)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      # Repeated here because add_header in this block overrides the server-level header
      add_header Strict-Transport-Security "max-age=63072000" always;
    }

    location @proxy_to_app {
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host $http_host;
      # we don't want nginx trying to do something clever with
      # redirects, we set the Host: header above already.
      proxy_redirect off;
      proxy_pass http://app_server;

      proxy_connect_timeout 300s;  # Time to establish connection to upstream
      proxy_send_timeout    300s;  # Time between successive writes to upstream
      proxy_read_timeout    300s;  # Time to wait for upstream to send a response
    }

    error_page 500 502 503 504 /500.html;
    location = /500.html {
      root /path/to/app/current/public;
    }
  }
}
